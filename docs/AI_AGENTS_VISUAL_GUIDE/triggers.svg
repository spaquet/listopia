<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="700" y="35" font-size="32" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Three Ways to Trigger Agents
  </text>

  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- TRIGGER 1: MANUAL -->
  <g id="manual">
    <text x="250" y="100" font-size="16" font-weight="bold" fill="#1e40af">1. MANUAL TRIGGER</text>

    <!-- Main box -->
    <rect x="50" y="130" width="400" height="700" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>

    <!-- Step 1: User Action -->
    <rect x="70" y="150" width="360" height="80" fill="#fff" stroke="#3b82f6" stroke-width="1" rx="4"/>
    <text x="80" y="175" font-size="12" font-weight="bold" fill="#1e40af">User clicks [Run Agent]</text>
    <text x="80" y="195" font-size="11" fill="#666">In chat or from agent library</text>
    <text x="80" y="215" font-size="11" fill="#666">or directly from list view</text>

    <!-- Arrow down -->
    <path d="M 250,230 L 250,270" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

    <!-- Step 2: Trigger Service -->
    <rect x="70" y="270" width="360" height="100" fill="#fff" stroke="#3b82f6" stroke-width="1" rx="4"/>
    <text x="80" y="295" font-size="12" font-weight="bold" fill="#1e40af">AgentTriggerService</text>
    <text x="80" y="315" font-size="11" fill="#666">.trigger_manual(</text>
    <text x="80" y="330" font-size="11" fill="#666">  agent, user, input, invocable</text>
    <text x="80" y="345" font-size="11" fill="#666">)</text>

    <!-- Arrow down -->
    <path d="M 250,370 L 250,410" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

    <!-- Step 3: Create Run -->
    <rect x="70" y="410" width="360" height="80" fill="#fff" stroke="#3b82f6" stroke-width="1" rx="4"/>
    <text x="80" y="435" font-size="12" font-weight="bold" fill="#1e40af">Create AiAgentRun</text>
    <text x="80" y="455" font-size="11" fill="#666">status: pending (or awaiting_input)</text>
    <text x="80" y="475" font-size="11" fill="#666">Store user input & parameters</text>

    <!-- Arrow down -->
    <path d="M 250,490 L 250,530" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

    <!-- Step 4: Execute -->
    <rect x="70" y="530" width="360" height="100" fill="#fff" stroke="#3b82f6" stroke-width="1" rx="4"/>
    <text x="80" y="555" font-size="12" font-weight="bold" fill="#1e40af">AgentRunJob</text>
    <text x="80" y="575" font-size="11" fill="#666">Executes immediately or after</text>
    <text x="80" y="590" font-size="11" fill="#666">pre-run questions answered</text>
    <text x="80" y="610" font-size="11" fill="#666">(async in background)</text>

    <!-- Arrow down -->
    <path d="M 250,630 L 250,670" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

    <!-- Step 5: Complete -->
    <rect x="70" y="670" width="360" height="120" fill="#d1fae5" stroke="#059669" stroke-width="2" rx="4"/>
    <text x="80" y="695" font-size="12" font-weight="bold" fill="#059669">✓ Complete</text>
    <text x="80" y="715" font-size="11" fill="#166534">Items created/modified</text>
    <text x="80" y="732" font-size="11" fill="#166534">User notified with results</text>
    <text x="80" y="749" font-size="11" fill="#166534">Feedback form displayed</text>
    <text x="80" y="766" font-size="11" fill="#166534">Events emitted</text>

    <!-- Key feature box -->
    <rect x="70" y="810" width="360" height="30" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="250" y="830" font-size="10" font-weight="bold" fill="#b45309" text-anchor="middle">Immediately responsive</text>
  </g>

  <!-- TRIGGER 2: EVENT-BASED -->
  <g id="eventTrigger">
    <text x="1100" y="100" font-size="16" font-weight="bold" fill="#059669">2. EVENT-TRIGGERED</text>

    <!-- Main box -->
    <rect x="750" y="130" width="400" height="700" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>

    <!-- Step 1: Event Occurs -->
    <rect x="770" y="150" width="360" height="100" fill="#fff" stroke="#10b981" stroke-width="1" rx="4"/>
    <text x="780" y="175" font-size="12" font-weight="bold" fill="#059669">Event Fires</text>
    <text x="780" y="195" font-size="11" fill="#666">Examples:</text>
    <text x="780" y="215" font-size="10" fill="#666">• list_item.completed</text>
    <text x="780" y="230" font-size="10" fill="#666">• list_item.created</text>
    <text x="780" y="245" font-size="10" fill="#666">• list_item.updated</text>

    <!-- Arrow down -->
    <path d="M 950,250 L 950,290" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

    <!-- Step 2: ActiveSupport Notification -->
    <rect x="770" y="290" width="360" height="100" fill="#fff" stroke="#10b981" stroke-width="1" rx="4"/>
    <text x="780" y="315" font-size="12" font-weight="bold" fill="#059669">Notification Published</text>
    <text x="780" y="335" font-size="10" fill="#666">ActiveSupport::Notifications</text>
    <text x="780" y="350" font-size="10" fill="#666">.publish("list_item.completed")</text>
    <text x="780" y="368" font-size="10" fill="#666">(with event_payload)</text>

    <!-- Arrow down -->
    <path d="M 950,390 L 950,430" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

    <!-- Step 3: Dispatcher Detects -->
    <rect x="770" y="430" width="360" height="100" fill="#fff" stroke="#10b981" stroke-width="1" rx="4"/>
    <text x="780" y="455" font-size="12" font-weight="bold" fill="#059669">AgentEventDispatchJob</text>
    <text x="780" y="475" font-size="10" fill="#666">Find all agents with:</text>
    <text x="780" y="490" font-size="10" fill="#666">trigger_config.event_type =</text>
    <text x="780" y="505" font-size="10" fill="#666">"list_item.completed"</text>

    <!-- Arrow down -->
    <path d="M 950,530 L 950,570" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

    <!-- Step 4: Match Agents -->
    <rect x="770" y="570" width="360" height="90" fill="#fff" stroke="#10b981" stroke-width="1" rx="4"/>
    <text x="780" y="595" font-size="12" font-weight="bold" fill="#059669">Matching Agents</text>
    <text x="780" y="615" font-size="11" fill="#666">Example: "List Organizer Agent"</text>
    <text x="780" y="630" font-size="11" fill="#666">is configured to trigger on this</text>
    <text x="780" y="645" font-size="11" fill="#666">event</text>

    <!-- Arrow down -->
    <path d="M 950,660 L 950,700" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

    <!-- Step 5: Auto-Execute -->
    <rect x="770" y="700" width="360" height="120" fill="#d1fae5" stroke="#059669" stroke-width="2" rx="4"/>
    <text x="780" y="725" font-size="12" font-weight="bold" fill="#059669">✓ Auto-Execute</text>
    <text x="780" y="745" font-size="11" fill="#166534">Agent runs in background</text>
    <text x="780" y="762" font-size="11" fill="#166534">No user action needed</text>
    <text x="780" y="779" font-size="11" fill="#166534">Results notifications sent</text>
    <text x="780" y="796" font-size="11" fill="#166534">Runs may be paused for HITL</text>

    <!-- Key feature box -->
    <rect x="770" y="830" width="360" height="30" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="950" y="850" font-size="10" font-weight="bold" fill="#b45309" text-anchor="middle">Responds to app events</text>
  </g>

  <!-- TRIGGER 3: SCHEDULED -->
  <g id="scheduled">
    <!-- Position this between the first two, or stack vertically -->
    <text x="700" y="900" font-size="16" font-weight="bold" fill="#b45309">3. SCHEDULED (CRON)</text>

    <!-- Main box -->
    <rect x="500" y="530" width="400" height="300" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>

    <!-- Step 1: Cron Config -->
    <rect x="520" y="550" width="360" height="80" fill="#fff" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="530" y="575" font-size="12" font-weight="bold" fill="#b45309">Cron Expression</text>
    <text x="530" y="595" font-size="11" fill="#666">Example: "0 9 * * 1"</text>
    <text x="530" y="610" font-size="11" fill="#666">= Every Monday at 9:00 AM</text>

    <!-- Arrow down -->
    <path d="M 700,630 L 700,670" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>

    <!-- Step 2: Schedule Job -->
    <rect x="520" y="670" width="360" height="100" fill="#fff" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="530" y="695" font-size="12" font-weight="bold" fill="#b45309">AgentScheduleJob</text>
    <text x="530" y="715" font-size="11" fill="#666">Runs every minute</text>
    <text x="530" y="730" font-size="11" fill="#666">Checks all scheduled agents</text>
    <text x="530" y="745" font-size="11" fill="#666">Evaluates cron expressions</text>

    <!-- Arrow down -->
    <path d="M 700,770 L 700,810" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>

    <!-- Step 3: Execute Due -->
    <rect x="520" y="810" width="360" height="100" fill="#d1fae5" stroke="#059669" stroke-width="2" rx="4"/>
    <text x="530" y="835" font-size="12" font-weight="bold" fill="#059669">✓ Execute When Due</text>
    <text x="530" y="855" font-size="11" fill="#166534">Creates AiAgentRun</text>
    <text x="530" y="872" font-size="11" fill="#166534">Executes agent</text>
    <text x="530" y="889" font-size="11" fill="#166534">Results notified</text>

    <!-- Key feature box -->
    <rect x="520" y="920" width="360" height="30" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="700" y="940" font-size="10" font-weight="bold" fill="#b45309" text-anchor="middle">Regular intervals, no user input</text>
  </g>

  <!-- Comparison Table -->
  <g id="comparison">
    <text x="50" y="1050" font-size="14" font-weight="bold" fill="#333">Comparison</text>

    <!-- Headers -->
    <rect x="50" y="1070" width="280" height="30" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
    <text x="190" y="1095" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Aspect</text>

    <rect x="330" y="1070" width="280" height="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="470" y="1095" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e40af">Manual</text>

    <rect x="610" y="1070" width="280" height="30" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
    <text x="750" y="1095" font-size="11" font-weight="bold" text-anchor="middle" fill="#059669">Event-Based</text>

    <rect x="890" y="1070" width="280" height="30" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="1030" y="1095" font-size="11" font-weight="bold" text-anchor="middle" fill="#b45309">Scheduled</text>

    <!-- Rows -->
    <!-- Row 1: When -->
    <rect x="50" y="1100" width="280" height="30" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
    <text x="190" y="1123" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">When</text>

    <rect x="330" y="1100" width="280" height="30" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="470" y="1123" font-size="10" text-anchor="middle" fill="#666">User clicks [Run]</text>

    <rect x="610" y="1100" width="280" height="30" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="750" y="1123" font-size="10" text-anchor="middle" fill="#666">Event occurs</text>

    <rect x="890" y="1100" width="280" height="30" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="1030" y="1123" font-size="10" text-anchor="middle" fill="#666">Cron schedule</text>

    <!-- Row 2: User Input -->
    <rect x="50" y="1130" width="280" height="30" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
    <text x="190" y="1153" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">User Input</text>

    <rect x="330" y="1130" width="280" height="30" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="470" y="1153" font-size="10" text-anchor="middle" fill="#666">Required</text>

    <rect x="610" y="1130" width="280" height="30" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="750" y="1153" font-size="10" text-anchor="middle" fill="#666">No (auto)</text>

    <rect x="890" y="1130" width="280" height="30" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="1030" y="1153" font-size="10" text-anchor="middle" fill="#666">No (auto)</text>

    <!-- Row 3: Latency -->
    <rect x="50" y="1160" width="280" height="30" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
    <text x="190" y="1183" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">Latency</text>

    <rect x="330" y="1160" width="280" height="30" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="470" y="1183" font-size="10" text-anchor="middle" fill="#666">Immediate</text>

    <rect x="610" y="1160" width="280" height="30" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="750" y="1183" font-size="10" text-anchor="middle" fill="#666">Instant (within 1s)</text>

    <rect x="890" y="1160" width="280" height="30" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="1030" y="1183" font-size="10" text-anchor="middle" fill="#666">At exact time</text>

    <!-- Row 4: Use Case -->
    <rect x="50" y="1190" width="280" height="30" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
    <text x="190" y="1213" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">Best For</text>

    <rect x="330" y="1190" width="280" height="30" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="470" y="1213" font-size="10" text-anchor="middle" fill="#666">Ad-hoc requests</text>

    <rect x="610" y="1190" width="280" height="30" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="750" y="1213" font-size="10" text-anchor="middle" fill="#666">Auto-responses</text>

    <rect x="890" y="1190" width="280" height="30" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="1030" y="1213" font-size="10" text-anchor="middle" fill="#666">Recurring tasks</text>
  </g>
</svg>