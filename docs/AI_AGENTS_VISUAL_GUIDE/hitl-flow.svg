<svg viewBox="0 0 1200 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="600" y="35" font-size="32" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Human-in-the-Loop (HITL) Flow
  </text>

  <defs>
    <marker id="arrowBlack" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Main flow column -->
  <g id="mainFlow">
    <!-- Step 1: Agent Running -->
    <circle cx="150" cy="100" r="30" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    <text x="150" y="105" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">1</text>
    <text x="150" y="150" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Agent Running</text>

    <!-- Arrow -->
    <path d="M 150,180 L 150,220" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowBlack)"/>

    <!-- Step 2: HITL Tool Called -->
    <circle cx="150" cy="250" r="30" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <text x="150" y="255" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
    <text x="150" y="300" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">HITL Tool Called</text>
    <text x="150" y="318" font-size="10" text-anchor="middle" fill="#666">ask_user() or</text>
    <text x="150" y="333" font-size="10" text-anchor="middle" fill="#666">confirm_action()</text>

    <!-- Arrow -->
    <path d="M 150,363 L 150,403" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowBlack)"/>

    <!-- Step 3: Create Interaction -->
    <circle cx="150" cy="433" r="30" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2"/>
    <text x="150" y="438" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">3</text>
    <text x="150" y="483" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Create Interaction</text>
    <text x="150" y="501" font-size="10" text-anchor="middle" fill="#666">AiAgentInteraction</text>
    <text x="150" y="516" font-size="10" text-anchor="middle" fill="#666">record created</text>

    <!-- Arrow -->
    <path d="M 150,546 L 150,586" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowBlack)"/>

    <!-- Step 4: Pause Run -->
    <circle cx="150" cy="616" r="30" fill="#ec4899" stroke="#be185d" stroke-width="2"/>
    <text x="150" y="621" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">4</text>
    <text x="150" y="666" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Pause Execution</text>
    <text x="150" y="684" font-size="10" text-anchor="middle" fill="#666">status: paused</text>

    <!-- Arrow -->
    <path d="M 150,714 L 150,754" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowBlack)"/>

    <!-- Step 5: User Responds -->
    <circle cx="150" cy="784" r="30" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="150" y="789" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">5</text>
    <text x="150" y="834" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">User Responds</text>
    <text x="150" y="852" font-size="10" text-anchor="middle" fill="#666">in UI modal</text>

    <!-- Arrow -->
    <path d="M 150,882 L 150,922" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowBlack)"/>

    <!-- Step 6: Resume -->
    <circle cx="150" cy="952" r="30" fill="#06b6d4" stroke="#0891b2" stroke-width="2"/>
    <text x="150" y="957" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">6</text>
  </g>

  <!-- Details column - Left side -->
  <g id="leftDetails">
    <!-- Step 2 details -->
    <rect x="300" y="220" width="500" height="120" fill="#fff" stroke="#f59e0b" stroke-width="2" rx="6"/>
    <text x="320" y="245" font-size="12" font-weight="bold" fill="#b45309">HITL Tools Available</text>

    <text x="320" y="270" font-size="11" fill="#333">ask_user(question, options[])</text>
    <text x="325" y="288" font-size="10" fill="#666">Free-form or multiple-choice question</text>
    <text x="325" y="303" font-size="10" fill="#666">Agent waits for response</text>

    <text x="320" y="323" font-size="11" fill="#333">confirm_action(description, outcome)</text>
    <text x="325" y="341" font-size="10" fill="#666">Request approval before action</text>

    <!-- Step 4 details -->
    <rect x="300" y="580" width="500" height="130" fill="#fff" stroke="#ec4899" stroke-width="2" rx="6"/>
    <text x="320" y="605" font-size="12" font-weight="bold" fill="#be185d">What Happens When Paused</text>

    <text x="320" y="630" font-size="10" fill="#666">• Run status changed to "paused"</text>
    <text x="320" y="648" font-size="10" fill="#666">• Current LLM thread stopped</text>
    <text x="320" y="666" font-size="10" fill="#666">• Question stored in AiAgentInteraction</text>
    <text x="320" y="684" font-size="10" fill="#666">• User notified immediately</text>
    <text x="320" y="702" font-size="10" fill="#666">• Agent can be paused multiple times</text>
  </g>

  <!-- Details column - Right side -->
  <g id="rightDetails">
    <!-- Step 3 details -->
    <rect x="850" y="400" width="330" height="150" fill="#fff" stroke="#8b5cf6" stroke-width="2" rx="6"/>
    <text x="870" y="425" font-size="12" font-weight="bold" fill="#6d28d9">AiAgentInteraction Record</text>

    <text x="870" y="450" font-size="10" fill="#666">Stores:</text>
    <text x="870" y="468" font-size="10" fill="#666">• question (what agent asked)</text>
    <text x="870" y="483" font-size="10" fill="#666">• options[] (if multiple choice)</text>
    <text x="870" y="498" font-size="10" fill="#666">• user_response (answer)</text>
    <text x="870" y="513" font-size="10" fill="#666">• status (pending / answered)</text>
    <text x="870" y="528" font-size="10" fill="#666">• timestamp</text>

    <!-- Step 5 details -->
    <rect x="850" y="580" width="330" height="150" fill="#fff" stroke="#10b981" stroke-width="2" rx="6"/>
    <text x="870" y="605" font-size="12" font-weight="bold" fill="#059669">User Sees Modal</text>

    <text x="870" y="630" font-size="10" fill="#666">❓ Question from Agent:</text>
    <text x="875" y="648" font-size="9" fill="#666" font-style="italic">"I found 5 duplicates.</text>
    <text x="875" y="661" font-size="9" fill="#666" font-style="italic">Should I delete?"</text>

    <text x="870" y="681" font-size="10" fill="#666">Options:</text>
    <text x="875" y="698" font-size="9" fill="#666">[Yes] [No] [Review first]</text>

    <text x="870" y="715" font-size="10" fill="#666">User selects → marked_answered!</text>
  </g>

  <!-- Example scenario at bottom -->
  <g id="example">
    <rect x="50" y="730" width="1100" height="240" fill="#f9fafb" stroke="#d1d5db" stroke-width="2" rx="8"/>

    <text x="70" y="755" font-size="13" font-weight="bold" fill="#333">Real Example: Shopping List Organizer</text>

    <!-- Timeline -->
    <rect x="70" y="780" width="1060" height="170" fill="#fff" stroke="#e5e7eb" stroke-width="1" rx="4"/>

    <!-- Timeline items -->
    <text x="90" y="805" font-size="11" font-weight="bold" fill="#1e40af">Step 1:</text>
    <text x="180" y="805" font-size="10" fill="#666">List Organizer Agent running, analyzing "grocery shopping" list</text>

    <text x="90" y="825" font-size="11" font-weight="bold" fill="#f59e0b">Step 2:</text>
    <text x="180" y="825" font-size="10" fill="#666">Agent calls: ask_user("Group items by category?", ["Yes", "No"])</text>

    <text x="90" y="845" font-size="11" font-weight="bold" fill="#8b5cf6">Step 3:</text>
    <text x="180" y="845" font-size="10" fill="#666">AiAgentInteraction created, run paused, user sees modal</text>

    <text x="90" y="865" font-size="11" font-weight="bold" fill="#10b981">Step 4:</text>
    <text x="180" y="865" font-size="10" fill="#666">User clicks [Yes], response saved</text>

    <text x="90" y="885" font-size="11" font-weight="bold" fill="#06b6d4">Step 5:</text>
    <text x="180" y="885" font-size="10" fill="#666">AgentRunJob resumes with answer injected into LLM prompt</text>

    <text x="90" y="905" font-size="11" font-weight="bold" fill="#ec4899">Step 6:</text>
    <text x="180" y="905" font-size="10" fill="#666">Agent continues: creates 4 category groups, may ask more questions...</text>

    <text x="90" y="925" font-size="11" font-weight="bold" fill="#059669">Step 7:</text>
    <text x="180" y="925" font-size="10" fill="#666">Agent completes → items organized into categories ✓</text>
  </g>

  <!-- Key insights box -->
  <g id="insights">
    <rect x="50" y="990" width="1100" height="1" fill="#d1d5db"/>
    <text x="70" y="1010" font-size="11" fill="#666">
      <tspan font-weight="bold">Key Insight:</tspan> HITL allows agents to pause and ask questions, creating interactive workflows. Users can guide the agent's reasoning in real-time, making complex automation feel like collaboration.
    </text>
  </g>
</svg>