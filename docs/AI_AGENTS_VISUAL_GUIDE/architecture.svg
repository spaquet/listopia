<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="600" y="35" font-size="32" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    AI Agent Architecture
  </text>

  <!-- Background sections -->
  <rect x="50" y="80" width="1100" height="700" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="2" rx="8"/>

  <!-- Section headers -->
  <line x1="50" y1="150" x2="1150" y2="150" stroke="#d0d0d0" stroke-width="1"/>
  <text x="60" y="130" font-size="14" font-weight="bold" fill="#666">System Components</text>

  <!-- Component 1: Trigger System (Left)
  <g>
    <rect x="70" y="170" width="180" height="200" fill="#fff" stroke="#3b82f6" stroke-width="2" rx="6"/>
    <rect x="70" y="170" width="180" height="40" fill="#3b82f6" rx="6"/>
    <text x="160" y="200" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Trigger System</text>

    <text x="80" y="235" font-size="11" font-weight="bold" fill="#333">Manual</text>
    <circle cx="250" cy="233" r="3" fill="#3b82f6"/>
    <text x="80" y="255" font-size="11" fill="#666">User clicks "Run"</text>

    <text x="80" y="280" font-size="11" font-weight="bold" fill="#333">Event-Based</text>
    <circle cx="250" cy="278" r="3" fill="#3b82f6"/>
    <text x="80" y="300" font-size="11" fill="#666">Item completed</text>

    <text x="80" y="325" font-size="11" font-weight="bold" fill="#333">Scheduled</text>
    <circle cx="250" cy="323" r="3" fill="#3b82f6"/>
    <text x="80" y="345" font-size="11" fill="#666">Cron: Monday 9am</text>
  </g>

  <!-- Component 2: Agent Config (Center-left)
  <g>
    <rect x="310" y="170" width="180" height="200" fill="#fff" stroke="#10b981" stroke-width="2" rx="6"/>
    <rect x="310" y="170" width="180" height="40" fill="#10b981" rx="6"/>
    <text x="400" y="200" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Configuration</text>

    <text x="320" y="235" font-size="11" font-weight="bold" fill="#333">Persona</text>
    <text x="320" y="252" font-size="10" fill="#666">Role & tone</text>

    <text x="320" y="275" font-size="11" font-weight="bold" fill="#333">Instructions</text>
    <text x="320" y="292" font-size="10" fill="#666">Step-by-step SOP</text>

    <text x="320" y="315" font-size="11" font-weight="bold" fill="#333">Context Config</text>
    <text x="320" y="332" font-size="10" fill="#666">Auto-load what?</text>

    <text x="320" y="355" font-size="11" font-weight="bold" fill="#333">Pre-Run Questions</text>
    <text x="320" y="372" font-size="10" fill="#666">Ask user first</text>
  </g>

  <!-- Component 3: Execution Engine (Center)
  <g>
    <rect x="550" y="170" width="180" height="200" fill="#fff" stroke="#f59e0b" stroke-width="2" rx="6"/>
    <rect x="550" y="170" width="180" height="40" fill="#f59e0b" rx="6"/>
    <text x="640" y="200" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Execution Engine</text>

    <text x="560" y="235" font-size="11" font-weight="bold" fill="#333">Context Builder</text>
    <text x="560" y="252" font-size="10" fill="#666">Compose prompt</text>

    <text x="560" y="275" font-size="11" font-weight="bold" fill="#333">LLM Loop</text>
    <text x="560" y="292" font-size="10" fill="#666">Generate actions</text>

    <text x="560" y="315" font-size="11" font-weight="bold" fill="#333">Tool Executor</text>
    <text x="560" y="332" font-size="10" fill="#666">Run tools</text>

    <text x="560" y="355" font-size="11" font-weight="bold" fill="#333">State Manager</text>
    <text x="560" y="372" font-size="10" fill="#666">Track progress</text>
  </g>

  <!-- Component 4: Tool Builder (Center-right)
  <g>
    <rect x="790" y="170" width="180" height="200" fill="#fff" stroke="#8b5cf6" stroke-width="2" rx="6"/>
    <rect x="790" y="170" width="180" height="40" fill="#8b5cf6" rx="6"/>
    <text x="880" y="200" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Tool Builder</text>

    <text x="800" y="235" font-size="11" font-weight="bold" fill="#333">List/Item CRUD</text>
    <text x="800" y="252" font-size="10" fill="#666">Read, create, update</text>

    <text x="800" y="275" font-size="11" font-weight="bold" fill="#333">Web Search</text>
    <text x="800" y="292" font-size="10" fill="#666">External research</text>

    <text x="800" y="315" font-size="11" font-weight="bold" fill="#333">Human-in-Loop</text>
    <text x="800" y="332" font-size="10" fill="#666">Ask, confirm</text>

    <text x="800" y="355" font-size="11" font-weight="bold" fill="#333">Sub-agents</text>
    <text x="800" y="372" font-size="10" fill="#666">Invoke other agents</text>
  </g>

  <!-- Component 5: Memory System (Right)
  <g>
    <rect x="1030" y="170" width="120" height="200" fill="#fff" stroke="#ec4899" stroke-width="2" rx="6"/>
    <rect x="1030" y="170" width="120" height="40" fill="#ec4899" rx="6"/>
    <text x="1090" y="200" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Memory</text>

    <text x="1040" y="235" font-size="11" font-weight="bold" fill="#333">Current Run</text>
    <text x="1040" y="252" font-size="10" fill="#666">Messages</text>

    <text x="1040" y="275" font-size="11" font-weight="bold" fill="#333">Recent Runs</text>
    <text x="1040" y="292" font-size="10" fill="#666">Prior context</text>

    <text x="1040" y="315" font-size="11" font-weight="bold" fill="#333">Embeddings</text>
    <text x="1040" y="332" font-size="10" fill="#666">Semantic search</text>
  </g>

  <!-- Data Flow Arrows -->
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981"/>
    </marker>
    <marker id="arrowyellow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowpurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Flow arrows -->
  <path d="M 250,270 L 310,270" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowblue)"/>
  <path d="M 490,270 L 550,270" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowgreen)"/>
  <path d="M 730,270 L 790,270" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowyellow)"/>
  <path d="M 970,270 L 1030,270" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowpurple)"/>

  <!-- Lower section: How it works -->
  <line x1="50" y1="410" x2="1150" y2="410" stroke="#d0d0d0" stroke-width="1"/>
  <text x="60" y="390" font-size="14" font-weight="bold" fill="#666">Execution Flow</text>

  <!-- Flow steps -->
  <g>
    <!-- Step 1 -->
    <circle cx="120" cy="470" r="35" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    <text x="120" y="475" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">1</text>
    <text x="120" y="525" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Trigger</text>
    <text x="120" y="545" font-size="10" text-anchor="middle" fill="#666">Manual/Event/</text>
    <text x="120" y="560" font-size="10" text-anchor="middle" fill="#666">Scheduled</text>

    <!-- Arrow -->
    <path d="M 155,470 L 235,470" stroke="#999" stroke-width="2" fill="none" marker-end="url(#arrowgray)"/>

    <!-- Step 2 -->
    <circle cx="290" cy="470" r="35" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="290" y="475" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
    <text x="290" y="525" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Load Config</text>
    <text x="290" y="545" font-size="10" text-anchor="middle" fill="#666">Persona, instructions,</text>
    <text x="290" y="560" font-size="10" text-anchor="middle" fill="#666">questions</text>

    <!-- Arrow -->
    <path d="M 325,470 L 405,470" stroke="#999" stroke-width="2" fill="none" marker-end="url(#arrowgray)"/>

    <!-- Step 3 -->
    <circle cx="460" cy="470" r="35" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <text x="460" y="475" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">3</text>
    <text x="460" y="525" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Build Context</text>
    <text x="460" y="545" font-size="10" text-anchor="middle" fill="#666">System prompt with</text>
    <text x="460" y="560" font-size="10" text-anchor="middle" fill="#666">lists, items, memory</text>

    <!-- Arrow -->
    <path d="M 495,470 L 575,470" stroke="#999" stroke-width="2" fill="none" marker-end="url(#arrowgray)"/>

    <!-- Step 4 -->
    <circle cx="630" cy="470" r="35" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2"/>
    <text x="630" y="475" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">4</text>
    <text x="630" y="525" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Execute Loop</text>
    <text x="630" y="545" font-size="10" text-anchor="middle" fill="#666">LLM generates &</text>
    <text x="630" y="560" font-size="10" text-anchor="middle" fill="#666">executes tools</text>

    <!-- Arrow -->
    <path d="M 665,470 L 745,470" stroke="#999" stroke-width="2" fill="none" marker-end="url(#arrowgray)"/>

    <!-- Step 5 -->
    <circle cx="800" cy="470" r="35" fill="#ec4899" stroke="#be185d" stroke-width="2"/>
    <text x="800" y="475" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">5</text>
    <text x="800" y="525" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Store Results</text>
    <text x="800" y="545" font-size="10" text-anchor="middle" fill="#666">Save items, emit</text>
    <text x="800" y="560" font-size="10" text-anchor="middle" fill="#666">events, notify user</text>

    <!-- Arrow -->
    <path d="M 835,470 L 915,470" stroke="#999" stroke-width="2" fill="none" marker-end="url(#arrowgray)"/>

    <!-- Step 6 -->
    <circle cx="970" cy="470" r="35" fill="#06b6d4" stroke="#0891b2" stroke-width="2"/>
    <text x="970" y="475" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">6</text>
    <text x="970" y="525" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Complete</text>
    <text x="970" y="545" font-size="10" text-anchor="middle" fill="#666">Run finished,</text>
    <text x="970" y="560" font-size="10" text-anchor="middle" fill="#666">feedback collected</text>
  </g>

  <!-- Gray arrow marker for flow -->
  <defs>
    <marker id="arrowgray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#999"/>
    </marker>
  </defs>

  <!-- Bottom legend -->
  <g>
    <text x="60" y="680" font-size="12" font-weight="bold" fill="#333">Key Insight:</text>
    <text x="60" y="705" font-size="11" fill="#666">Agents work by combining persona, instructions, and context into a system prompt that the LLM</text>
    <text x="60" y="725" font-size="11" fill="#666">interprets. The LLM decides what tools to call, and the executor runs them. Results feed back to the</text>
    <text x="60" y="745" font-size="11" fill="#666">LLM in a loop until the agent completes or requests user input (human-in-the-loop).</text>
  </g>
</svg>